name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute build tag
        id: tag
        shell: bash
        run: echo "TAG=build-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - run: dotnet publish BetterSlideshowScreensaver/BetterSlideshowScreensaver.csproj -c Release -o publish /p:InformationalVersion=${{ steps.tag.outputs.TAG }}

      - name: Rename exe to scr
        run: mv publish/BetterSlideshowScreensaver.exe publish/BetterSlideshowScreensaver.scr
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterSlideshowScreensaver
          path: publish/BetterSlideshowScreensaver.scr

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release create "$TAG" \
            --title "Build $SHORT_SHA" \
            --notes "Automated build from commit $SHORT_SHA" \
            publish/BetterSlideshowScreensaver.scr
