name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet publish BetterSlideshowScreensaver/BetterSlideshowScreensaver.csproj -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterSlideshowScreensaver
          path: publish/BetterSlideshowScreensaver.scr

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release create "$TAG" \
            --title "Build $SHORT_SHA" \
            --notes "Automated build from commit $SHORT_SHA" \
            publish/BetterSlideshowScreensaver.scr
